name: continuous-integration
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: 'always'
  CONTAINER_REGISTRY: 'ghcr.io'
  RUST_BACKTRACE: '1'
  RUST_VERSION: '1.90.0'
jobs:
  rustfmt:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: mbrobbel/rustfmt-check@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: review
  test-goreleaser-build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: read rust version from rust-toolchain.toml
        id: rust-version
        run: |
          RUST_VERSION=$(awk -F'"' '/^channel/{print $2; exit}' rust-toolchain.toml)
          echo "::notice::file=rust-toolchain.toml,line=2::rust version = $RUST_VERSION"
          echo "version=$RUST_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: docker/setup-buildx-action@v3
        with:
          name: goreleaser
          use: true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
          toolchain: ${{ steps.rust-version.outputs.version }}
      - uses: swatinem/rust-cache@v2
      - uses: mlugg/setup-zig@v2
      - uses: sigstore/cosign-installer@main
      - uses: anchore/sbom-action/download-syft@v0.18.0
      - name: write cosign.key file for signing
        run:
          echo "${{ secrets.COSIGN_KEY }}" | base64 --decode > cosign.key
      - name: read cue version from cue.mod
        id: cue-version
        run: |
          CUE_VERSION=$(awk -F'"' '/^\tversion:/{print $2; exit}' cue.mod/module.cue)
          echo "::notice::file=cue.mod/module.cue,line=3::cue version = $CUE_VERSION"
          echo "version=$CUE_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: cue-lang/setup-cue@v1.0.1
        with:
          version: ${{ steps.cue-version.outputs.version }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: generate .goreleaser.yaml from cue
        run: |
          task goreleaser:generate
        shell: bash
      - run: sudo apt-get install -y lld
        shell: bash
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force cargo-zigbuild
        shell: bash
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --config aarch64/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PWD: ${{ secrets.COSIGN_PWD }}
          RUSTFLAGS: '-C linker=/usr/bin/ld.lld -C linker-flavor=ld.lld'
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target/
          key: ${{ runner.os }}-${{ github.workflow }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.workflow }}-cargo-test-
      - run: task cargo:test
