name: release
on:
  push:
    tags:
      - 'v[0-9].[0-9]+.[0-9]+'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
permissions: write-all
env:
  CONTAINER_REGISTRY: 'ghcr.io'
jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: dump context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - uses: actions/checkout@v5
      - name: read rust version from rust-toolchain.toml
        id: rust-version
        run: |
          RUST_VERSION=$(awk -F'"' '/^channel/{print $2; exit}' rust-toolchain.toml)
          echo "::notice::file=rust-toolchain.toml,line=2::rust version = $RUST_VERSION"
          echo "version=$RUST_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt
          toolchain: ${{ steps.rust-version.outputs.version }}
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force cargo-edit
      - id: pkg-version
        run: |
          ref_string="${{ github.ref }}"
          version="${ref_string#refs/tags/v}"
          cargo set-version "$version"
          cargo update gohome
          echo "package-version=$version" >> "$GITHUB_OUTPUT"
      - uses: peter-evans/create-pull-request@v7
        id: create-pull-request
        with:
          token: ${{ secrets.RELEASE_PAT }}
          add-paths: |
            Cargo.toml
            Cargo.lock
          base: 'main'
          commit-message: 'feat: bump cargo version to: ${{ steps.pkg-version.outputs.package-version }}'
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          sign-commits: true
          title: 'feat: bump cargo version to: ${{ steps.pkg-version.outputs.package-version }}'
          body: |
            - bump cargo version to ${{ steps.pkg-version.outputs.package-version }}
            - Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          labels: |
            release
      - run: gh pr merge --squash --auto "${{ steps.create-pull-request.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: wait for pull request to be merged
        run: |
          pr_number="${{ steps.create-pull-request.outputs.pull-request-number }}"
          if [ -z "$pr_number" ]; then
            echo "No PR created, skipping wait"
            exit 0
          fi
          echo "Waiting for PR #$pr_number to be merged..."
          while true; do
            state=$(gh pr view "$pr_number" --json state --jq '.state')
            if [ "$state" = "MERGED" ]; then
              echo "PR #$pr_number merged successfully"
              break
            elif [ "$state" = "CLOSED" ]; then
              echo "Error: PR #$pr_number was closed without merging" >&2
              exit 1
            fi
            echo "  PR state: $state, waiting 30s..."
            sleep 30
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  goreleaser:
    needs: ["bump-version"]
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
          - arch: x86_64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: read rust version from rust-toolchain.toml
        id: rust-version
        run: |
          RUST_VERSION=$(awk -F'"' '/^channel/{print $2; exit}' rust-toolchain.toml)
          echo "::notice::file=rust-toolchain.toml,line=2::rust version = $RUST_VERSION"
          echo "version=$RUST_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: docker/setup-buildx-action@v3
        with:
          name: goreleaser
          use: true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
          toolchain: ${{ steps.rust-version.outputs.version }}
      - uses: swatinem/rust-cache@v2
      - uses: mlugg/setup-zig@v2
      - uses: sigstore/cosign-installer@main
      - uses: anchore/sbom-action/download-syft@v0.18.0
      - name: write cosign.key file for signing
        run:
          echo "${{ secrets.COSIGN_KEY }}" | base64 --decode > cosign.key
      - name: read cue version from cue.mod
        id: cue-version
        run: |
          CUE_VERSION=$(awk -F'"' '/^\tversion:/{print $2; exit}' cue.mod/module.cue)
          echo "::notice::file=cue.mod/module.cue,line=3::cue version = $CUE_VERSION"
          echo "version=$CUE_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash
      - uses: cue-lang/setup-cue@v1.0.1
        with:
          version: ${{ steps.cue-version.outputs.version }}
      - uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: generate .goreleaser.yaml from cue
        run: |
          task goreleaser:generate
        shell: bash
      - run: sudo apt-get install -y lld
        shell: bash
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm --force cargo-zigbuild
        shell: bash
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --verbose --clean --config ${{ matrix.arch }}/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PWD: ${{ secrets.COSIGN_PWD }}
          RUSTFLAGS: '-C linker=/usr/bin/ld.lld -C linker-flavor=ld.lld'
      - uses: actions/attest-build-provenance@v3
        with:
          subject-checksums: './dist/${{ github.event.repository.name }}_${{ matrix.arch }}_checksums.txt'
          push-to-registry: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
  