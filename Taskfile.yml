# https://taskfile.dev

version: '3'

includes:
  cargo: .cargo/Taskfile.yml

# optional configurations (output, silent, method, run, etc.)
# vars:
# env:

tasks:

  clean:
    cmds:
      - 'rm -f aarch64/.goreleaser.yaml x86_64/.goreleaser.yaml'
      - 'rm -rf dist/'
      - 'cargo clean'

  'markdown:lint':
    cmds:
      - 'markdownlint **/*.md --fix --disable MD013'
    sources:
      - '**/.md'
  
  'rust:version':
    cmds:
      - 'toml get -r rust-toolchain.toml toolchain.channel'
  
  'goreleaser:generate':
    desc: 'Generate .goreleaser.yaml from cue/goreleaser.cue'
    deps:
      - clean
    cmds:
      - 'cue export ./cue/... -e files.aarch64 --out yaml --force --outfile aarch64/.goreleaser.yaml'
      - 'cue export ./cue/... -e files.x86_64 --out yaml --force --outfile x86_64/.goreleaser.yaml'

